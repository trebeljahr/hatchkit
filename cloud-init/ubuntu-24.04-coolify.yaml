#cloud-config
package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - fail2ban
  - git
  - jq
  - qemu-guest-agent
  - unattended-upgrades
  - software-properties-common
  - apt-transport-https
write_files:
  - path: /etc/fail2ban/jail.d/sshd.local
    owner: root:root
    permissions: '0644'
    content: |
      [sshd]
      enabled = true
  - path: /etc/sysctl.d/99-coolify.conf
    owner: root:root
    permissions: '0644'
    content: |
      vm.swappiness=10
      net.core.somaxconn=1024
runcmd:
  - [ sh, -lc, 'systemctl enable --now qemu-guest-agent || true' ]
  - [ sh, -lc, 'systemctl enable --now fail2ban' ]
  - [ sh, -lc, 'systemctl enable --now unattended-upgrades || true' ]
  - [ sh, -lc, 'sysctl --system' ]
  - [ sh, -lc, 'if [ ! -f /swapfile ]; then fallocate -l 2G /swapfile && chmod 600 /swapfile && mkswap /swapfile && swapon /swapfile; fi' ]
  - [ sh, -lc, "grep -q '^/swapfile ' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab" ]
final_message: 'Base VPS bootstrap complete. Install Coolify next.'
