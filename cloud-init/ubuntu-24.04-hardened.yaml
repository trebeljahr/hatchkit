#cloud-config
# Hardened first-boot configuration for Ubuntu 24.04 on Hetzner.
#
# This runs ONCE on first boot, before Ansible. It handles the bare minimum
# needed for Ansible to connect and start hardening:
# - System updates
# - Essential packages (including UFW)
# - Basic sysctl hardening (applied early, before Ansible refines it)
# - fail2ban for SSH (protection starts immediately)
# - Swap setup
# - Completion marker for Terraform to check
#
# Full hardening is done by Ansible (playbooks/harden.yml) after this completes.

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - fail2ban
  - git
  - jq
  - qemu-guest-agent
  - ufw
  - unattended-upgrades
  - apt-listchanges
  - software-properties-common
  - apt-transport-https

write_files:
  # fail2ban — immediate SSH protection
  - path: /etc/fail2ban/jail.d/sshd.local
    owner: root:root
    permissions: "0644"
    content: |
      [sshd]
      enabled = true
      port = ssh
      logpath = /var/log/auth.log
      backend = systemd
      maxretry = 3
      findtime = 600
      bantime = 86400
      banaction = ufw

  # sysctl — full hardening applied on first boot.
  # Matches the Ansible template (roles/base/templates/99-hardening.conf.j2)
  # with safe static defaults for conditional params.
  - path: /etc/sysctl.d/99-hardening.conf
    owner: root:root
    permissions: "0644"
    content: |
      # Network hardening
      net.ipv4.conf.all.rp_filter = 1
      net.ipv4.conf.default.rp_filter = 1
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv4.conf.default.accept_redirects = 0
      net.ipv4.conf.all.send_redirects = 0
      net.ipv4.conf.default.send_redirects = 0
      net.ipv6.conf.all.accept_redirects = 0
      net.ipv6.conf.default.accept_redirects = 0
      net.ipv4.conf.all.accept_source_route = 0
      net.ipv4.conf.default.accept_source_route = 0
      net.ipv6.conf.all.accept_source_route = 0
      net.ipv6.conf.default.accept_source_route = 0
      net.ipv4.icmp_echo_ignore_broadcasts = 1
      net.ipv4.icmp_ignore_bogus_error_responses = 1
      net.ipv4.tcp_rfc1337 = 1
      net.ipv4.tcp_timestamps = 0
      net.core.somaxconn = 1024
      net.ipv4.tcp_congestion_control = bbr
      vm.swappiness = 10
      # Kernel hardening
      kernel.dmesg_restrict = 1
      kernel.kptr_restrict = 2
      kernel.yama.ptrace_scope = 1
      kernel.unprivileged_bpf_disabled = 1
      net.core.bpf_jit_harden = 2
      kernel.kexec_load_disabled = 1
      kernel.sysrq = 0
      kernel.perf_event_paranoid = 3
      kernel.io_uring_disabled = 2
      vm.mmap_rnd_bits = 32
      vm.mmap_rnd_compat_bits = 16
      # Core dumps
      fs.suid_dumpable = 0

  # Resource limits — prevent fork bombs and core dumps
  - path: /etc/security/limits.d/hardening.conf
    owner: root:root
    permissions: "0644"
    content: |
      *    hard    nproc     4096
      *    hard    nofile    65535
      *    soft    nofile    65535
      *    hard    core      0

  # Disable systemd coredumps
  - path: /etc/systemd/coredump.conf.d/hardening.conf
    owner: root:root
    permissions: "0644"
    content: |
      [Coredump]
      Storage=none
      ProcessSizeMax=0

  # Unattended upgrades — auto-reboot at 4am for kernel updates
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root:root
    permissions: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

runcmd:
  # Enable services
  - [sh, -lc, "systemctl enable --now qemu-guest-agent || true"]
  - [sh, -lc, "systemctl enable --now fail2ban"]
  - [sh, -lc, "systemctl enable --now unattended-upgrades || true"]
  # Apply sysctl
  - [sh, -lc, "sysctl --system"]
  # UFW — allow SSH then enable
  - [sh, -lc, "ufw allow 22/tcp"]
  - [sh, -lc, "ufw allow 80/tcp"]
  - [sh, -lc, "ufw allow 443/tcp"]
  - [sh, -lc, 'echo "y" | ufw enable']
  # Swap
  - [sh, -lc, "if [ ! -f /swapfile ]; then fallocate -l 2G /swapfile && chmod 600 /swapfile && mkswap /swapfile && swapon /swapfile; fi"]
  - [sh, -lc, "grep -q '^/swapfile ' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab"]
  # Disable snapd
  - [sh, -lc, "systemctl disable --now snapd.socket snapd.service snapd.seeded.service 2>/dev/null || true"]
  # Harden /tmp mount (noexec,nosuid,nodev on tmpfs)
  - [sh, -lc, "grep -q '/tmp.*tmpfs.*noexec' /etc/fstab || echo 'tmpfs /tmp tmpfs rw,noexec,nosuid,nodev,size=2G,mode=1777 0 0' >> /etc/fstab"]
  # Bind-mount /var/tmp to /tmp (inherits noexec restrictions)
  - [sh, -lc, "grep -q '/var/tmp.*/tmp.*bind' /etc/fstab || echo '/tmp /var/tmp none bind 0 0' >> /etc/fstab"]
  # Harden /dev/shm mount (noexec)
  - [sh, -lc, "grep -q '/dev/shm.*noexec' /etc/fstab || echo 'tmpfs /dev/shm tmpfs rw,noexec,nosuid,nodev,size=1G 0 0' >> /etc/fstab"]
  # All three take effect on reboot (first boot completes with a reboot anyway)
  # Set umask to 027
  - [sh, -lc, "sed -i 's/^UMASK.*/UMASK\\t\\t027/' /etc/login.defs"]
  # Completion marker
  - [sh, -lc, "touch /var/lib/cloud/instance/hardening-init-done"]

final_message: "Hardened VPS bootstrap complete. Run Ansible playbooks/harden.yml next."
