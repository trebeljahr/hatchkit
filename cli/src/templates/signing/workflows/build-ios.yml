# iOS build → TestFlight via App Store Connect API.
#
# Required repo secrets:
#   APPLE_TEAM_ID                  — 10-char team identifier from developer.apple.com
#   APPLE_CERT_P12_BASE64          — base64 of `Apple Distribution` .p12 export
#   APPLE_CERT_P12_PASSWORD        — password for that .p12
#   APPLE_PROVISIONING_PROFILE_B64 — base64 of the App Store distribution profile (.mobileprovision)
#   APPLE_PROVISIONING_PROFILE_NAME — exact "Name" field of that profile
#   APPLE_KEYCHAIN_PASSWORD        — any random string; used to lock the temp keychain
#   APPSTORE_API_KEY_ID            — Key ID from App Store Connect → Users and Access → Keys
#   APPSTORE_API_ISSUER_ID         — Issuer ID from same page
#   APPSTORE_API_KEY_P8_BASE64     — base64 of AuthKey_<KEY_ID>.p8
#
# Setup steps (one-time):
#   1. Apple Developer Portal → Certificates → create "Apple Distribution" cert,
#      download, import to Keychain, export as .p12 with a password.
#   2. Identifiers → register __HATCHKIT_BUNDLE_ID__ if not already.
#   3. Profiles → create App Store distribution profile for that ID + dist cert.
#   4. App Store Connect → Users and Access → Keys → generate API key with
#      "App Manager" role. Download the .p8 (one-time only) and note Key ID + Issuer ID.
#   5. App Store Connect → My Apps → create the app record (SKU, primary language,
#      bundle ID) so TestFlight has a target.

name: Build iOS

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: __HATCHKIT_PNPM_VERSION__

      - uses: actions/setup-node@v4
        with:
          node-version: __HATCHKIT_NODE_VERSION__
          cache: pnpm

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - run: pnpm install --frozen-lockfile

      - name: Build web bundle and sync iOS
        run: |
          pnpm build
          npx cap sync ios

      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          echo -n "$CERT_B64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.APPLE_PROVISIONING_PROFILE_B64 }}
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo -n "$PROFILE_B64" | base64 --decode > "$PROFILE_DIR/dist.mobileprovision"

      - name: Render ExportOptions.plist
        run: |
          sed \
            -e "s/__APPLE_TEAM_ID__/${APPLE_TEAM_ID}/g" \
            -e "s/__APPLE_PROVISIONING_PROFILE_NAME__/${APPLE_PROVISIONING_PROFILE_NAME}/g" \
            scripts/ios-ExportOptions.plist.template \
            > "$RUNNER_TEMP/ExportOptions.plist"
          cat "$RUNNER_TEMP/ExportOptions.plist"

      - name: Bump CFBundleVersion from run number
        run: |
          set -euo pipefail
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" App/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" App/Info.plist

      - name: Archive
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$APPLE_PROVISIONING_PROFILE_NAME" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          ls -lah "$RUNNER_TEMP/ipa"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ runner.temp }}/ipa/App.ipa
          issuer-id: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_KEY_P8_BASE64 }}

      - name: Clean up keychain
        if: always()
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          if-no-files-found: error
