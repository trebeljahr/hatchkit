# .github/workflows/deploy.yml — Build and push to GHCR, trigger Coolify deploy.
#
# Copy this to your app repo's .github/workflows/ directory.
# Set these secrets in your GitHub repo settings:
#   COOLIFY_WEBHOOK_URL — from Coolify app settings → Webhooks

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Trigger Coolify deploy
        run: |
          curl -f -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"sha": "${{ github.sha }}"}'
