name: CLI CI

# Runs typecheck, lint, and the scaffold matrix on every push + PR.
# The test suite skips the scaffold-matrix blocks gracefully when the
# `starter` submodule isn't on disk, so we intentionally do NOT fetch
# submodules here — both `starter` and `infra` point at private SSH
# URLs that GitHub Actions' default token can't authenticate to.
#
# To run the full 12-group matrix locally (or in a runner with an SSH
# deploy key configured), `git submodule update --init` first.

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "cli/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter hatchkit run typecheck

      - name: Lint
        run: pnpm --filter hatchkit run lint

      - name: Test (scaffold matrix)
        run: pnpm --filter hatchkit run test
