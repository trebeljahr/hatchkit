# Build → push → deploy pipeline scaffolded by hatchkit.
#
#   1. Build the image from the repo's Dockerfile.
#   2. Push it to GHCR as both `ghcr.io/<owner>/<name>:<short-sha>`
#      and `:latest` (on the default branch).
#   3. Trigger Coolify to redeploy via the per-app deploy webhook.
#
# Required repo secrets (hatchkit sets these via `gh secret set`
# during adopt / create; rotate via the GitHub UI / `gh` whenever
# needed):
#   COOLIFY_WEBHOOK_URL — full URL incl. uuid query param
#   COOLIFY_TOKEN       — bearer token for the deploy endpoint
#
# The docs site reads nothing from .env, so no DOTENV_PRIVATE_KEY_*
# BuildKit secret is mounted. If a future Dockerfile starts baking
# encrypted env into the image, re-introduce a `secrets:` block on
# the build-push-action step and a matching `--mount=type=secret`
# RUN line in the Dockerfile.
#
# GHCR auth uses the workflow's built-in GITHUB_TOKEN. For Coolify
# to pull a private package, configure GHCR credentials in the
# Coolify dashboard once (Servers → Settings → Registry).
#
# Action versions: pinned to the latest Node.js 24-native releases
# where available. FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 below opts the
# remaining Node 20 actions (docker/* family) into the Node 24 runner
# until upstream cuts new majors — silences the GitHub Actions runner
# deprecation warning that fires on every workflow run otherwise.
name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Trigger Coolify deploy
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK_URL" ]; then
            echo "::notice::COOLIFY_WEBHOOK_URL not set — skipping Coolify webhook (image still pushed). Run \`hatchkit keys push <project>\` or set the secret manually if you want auto-deploy."
            exit 0
          fi
          curl -fsSL -X GET "$COOLIFY_WEBHOOK_URL" \
            -H "Authorization: Bearer $COOLIFY_TOKEN"
