name: Deploy docs to GitHub Pages

# Builds the Docusaurus site in `docs/` and publishes it to GitHub Pages.
# Triggers only when docs (or this workflow) actually change, so normal
# CLI work doesn't rebuild the site needlessly.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Pages uses a deploy environment — one in-flight deploy at a time,
# don't cancel a running deploy (that would leave the site half-updated).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Docusaurus
        # `baseUrl` in docusaurus.config.ts is the source of truth.
        # The pages action exposes `base_path` purely for diagnostics.
        run: pnpm build
        env:
          NODE_ENV: production

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
