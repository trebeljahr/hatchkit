title: hatchkit
description: Interactive CLI for scaffolding full-stack projects with composable ML services.
baseurl: "/hatchkit"
url: "https://trebeljahr.github.io"

# just-the-docs is a GitHub-supported remote theme — no custom build step
# beyond GitHub's standard Jekyll build.
remote_theme: just-the-docs/just-the-docs

# Site-wide settings for just-the-docs
color_scheme: dark
search_enabled: true
heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/trebeljahr/hatchkit"
  "npm":
    - "https://www.npmjs.com/package/hatchkit"

footer_content: >
  Hatchkit is MIT-licensed.
  <a href="https://github.com/trebeljahr/hatchkit">Source on GitHub</a>.

# Don't publish internal / scaffolding artefacts
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
