<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0b0d12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <pattern id="hatch" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="48" stroke="#1a1f2e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0b0d12"/>
  <rect width="1200" height="630" fill="url(#hatch)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark -->
  <g transform="translate(96, 88)">
    <rect width="120" height="120" rx="28" fill="#818cf8"/>
    <path d="M34 18 L102 86" stroke="#0b0d12" stroke-width="9" stroke-linecap="round"/>
    <path d="M18 34 L86 102" stroke="#0b0d12" stroke-width="9" stroke-linecap="round"/>
    <path d="M50 18 L102 70" stroke="#0b0d12" stroke-width="9" stroke-linecap="round" stroke-opacity="0.55"/>
    <path d="M18 50 L70 102" stroke="#0b0d12" stroke-width="9" stroke-linecap="round" stroke-opacity="0.55"/>
  </g>

  <text x="240" y="180" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-1">hatchkit</text>

  <!-- Headline -->
  <text x="96" y="320" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif" font-size="76" font-weight="700" fill="url(#text)" letter-spacing="-2.5">From <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="64" fill="#a5b4fc">npx hatchkit</tspan></text>
  <text x="96" y="408" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif" font-size="76" font-weight="700" fill="url(#text)" letter-spacing="-2.5">to a deployed full-stack app.</text>

  <!-- Tagline -->
  <text x="96" y="478" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="400" fill="#9aa3b2" letter-spacing="-0.3">Interactive CLI for scaffolding TypeScript projects with composable</text>
  <text x="96" y="516" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="400" fill="#9aa3b2" letter-spacing="-0.3">GPU-backed ML services — on infrastructure you own.</text>

  <!-- URL footer -->
  <g transform="translate(96, 572)">
    <circle cx="6" cy="-6" r="5" fill="#34d399"/>
    <text x="22" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="22" font-weight="500" fill="#9aa3b2">hatchkit.trebeljahr.com</text>
  </g>

  <!-- Border accent -->
  <rect x="0" y="0" width="1200" height="3" fill="#818cf8"/>
</svg>
