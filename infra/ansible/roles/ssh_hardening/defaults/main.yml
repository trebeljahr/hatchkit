# SSH hardening defaults.
# See docs/hardening-guide.md section 1.2 and 2.5 for explanations.

ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_kbd_interactive_authentication: "no"
ssh_pubkey_authentication: "yes"

# Users allowed to SSH in. Must match actual user on the system. Override
# in inventory `group_vars/all.yml` (see all.example.yml). Leaving empty
# falls back to whatever the SSH daemon's existing AllowUsers directive
# already permits — typically the user you bootstrapped the host with.
ssh_allowed_users: []

# Coolify compatibility: allow root login from Docker internal networks only.
# When true, adds a Match block that permits root key-based SSH from private
# IP ranges (Docker bridges), and appends 'root' to AllowUsers automatically.
# See docs/hardening-guide.md "Coolify-specific hardening" section.
ssh_coolify_compatibility: false
ssh_coolify_match_addresses: "172.16.0.0/12,10.0.0.0/8,192.168.0.0/16,127.0.0.1"

# Session limits
ssh_max_auth_tries: 3
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 2
ssh_login_grace_time: 30
ssh_max_sessions: 3

# Strong cryptography (modern-only algorithms)
ssh_kex_algorithms: >-
  sntrup761x25519-sha512@openssh.com,
  curve25519-sha256,
  curve25519-sha256@libssh.org
ssh_ciphers: >-
  chacha20-poly1305@openssh.com,
  aes256-gcm@openssh.com,
  aes128-gcm@openssh.com
ssh_macs: >-
  hmac-sha2-512-etm@openssh.com,
  hmac-sha2-256-etm@openssh.com
