# UFW firewall role — sets default deny incoming, allows specific ports.
# Order matters: we ALWAYS allow SSH first before enabling UFW.
#
# When ufw_docker_mitigation: true, we layer in chaifeng/ufw-docker — the
# canonical answer for "UFW + Docker actually working together" and what
# Coolify themselves recommend (https://coolify.io/docs/knowledge-base/server/firewall).
# The previous approach (apt install iptables-persistent + manual DOCKER-USER
# rules) is deliberately removed because installing iptables-persistent on
# Ubuntu has a packaging conflict with ufw — apt removes ufw to install
# iptables-persistent, leaving the host firewall-less without warning.

- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    default: allow

# Always allow SSH first (before enabling UFW) to prevent lockout
- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: SSH
  when: not ufw_restrict_ssh_to_tailscale

- name: Allow SSH from Tailscale only
  community.general.ufw:
    rule: allow
    from_ip: 100.64.0.0/10
    port: "22"
    proto: tcp
    comment: SSH via Tailscale
  when: ufw_restrict_ssh_to_tailscale

- name: Remove public SSH rule when restricting to Tailscale
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    delete: true
  when: ufw_restrict_ssh_to_tailscale
  failed_when: false

- name: Allow standard TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    comment: "Allowed port {{ item }}"
  loop: "{{ ufw_allowed_tcp_ports | reject('equalto', 22) | list }}"

- name: Allow extra bootstrap TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    comment: "Bootstrap port {{ item }} (remove after setup)"
  loop: "{{ ufw_extra_tcp_ports }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled

# --- Docker-UFW integration via ufw-docker (canonical) ---

- name: Install chaifeng/ufw-docker (pinned upstream tag)
  ansible.builtin.get_url:
    url: "https://github.com/chaifeng/ufw-docker/raw/{{ ufw_docker_version }}/ufw-docker"
    dest: /usr/local/bin/ufw-docker
    mode: "0755"
    checksum: "sha256:{{ ufw_docker_sha256 }}"
    owner: root
    group: root
  when: ufw_docker_mitigation

- name: Run ufw-docker install (writes block to /etc/ufw/after.rules)
  ansible.builtin.command: /usr/local/bin/ufw-docker install
  register: ufw_docker_install
  changed_when: "'After.rules has been modified' in ufw_docker_install.stdout or 'Backing up' in ufw_docker_install.stdout"
  when: ufw_docker_mitigation
  notify: Reload UFW

# Force the reload to happen now, before we add route allows below.
- name: Apply ufw-docker after.rules block immediately
  ansible.builtin.meta: flush_handlers
  when: ufw_docker_mitigation

- name: Allow forwarded traffic to Docker-published ports
  ansible.builtin.command: "ufw route allow proto tcp from any to any port {{ item }}"
  register: ufw_route_allow
  changed_when: "'Skipping adding existing rule' not in ufw_route_allow.stdout"
  loop: "{{ ufw_docker_allowed_ports }}"
  when: ufw_docker_mitigation

# Sanity check: confirm UFW survived. If a future packaging change ever
# causes silent UFW removal again, this fails the playbook loudly instead
# of leaving a misleading "ufw enabled but uninstalled" state.
- name: Verify UFW package is still installed (catch silent removal)
  ansible.builtin.shell: |
    set -euo pipefail
    status=$(dpkg-query -W -f='${db:Status-Abbrev}' ufw 2>/dev/null || echo "missing")
    if [ "$status" != "ii " ]; then
      echo "ufw is no longer installed (status: '$status')." >&2
      echo "Something in this run removed it. See infra/docs/hardening-guide.md ->" >&2
      echo "'Recovery from a silent UFW removal'." >&2
      exit 1
    fi
  changed_when: false
